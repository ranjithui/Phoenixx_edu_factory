<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phoenixx Edu Factory — Rise. Learn. Excel.</title>
    <meta 
      name="description"
      content="Phoenixx Edu Factory is a corporate training institute in Coimbatore offering soft skills, life skills, and NLP workshops for students, professionals, and organizations."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before paint to avoid flash of incorrect theme.
      (function () {
        try {
          var t = localStorage.getItem("phoenixx-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (t === "dark" || (!t && prefersDark)) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
